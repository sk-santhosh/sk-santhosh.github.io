<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="sm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="958" height="398" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="24" y="32" font-size="17" font-weight="700" fill="#0f172a">How application-level semantics are monitored</text>

  <!-- column headers -->
  <text x="40" y="64" font-size="12" fill="#475569" font-weight="600">1 · Instrument the trace</text>
  <text x="358" y="64" font-size="12" fill="#475569" font-weight="600">2 · Produce semantic signals</text>
  <text x="676" y="64" font-size="12" fill="#475569" font-weight="600">3 · Correlate &amp; monitor</text>

  <!-- column 1 -->
  <rect x="40" y="78" width="244" height="46" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="162" y="98" font-size="12.5" text-anchor="middle" fill="#1d4ed8" font-weight="600">AI application</text>
  <text x="162" y="115" font-size="10.5" text-anchor="middle" fill="#1d4ed8">request → response</text>

  <rect x="40" y="150" width="244" height="104" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="56" y="172" font-size="12.5" fill="#4338ca" font-weight="600">Trace · trace_id</text>
  <text x="56" y="192" font-size="10.5" fill="#475569">gen_ai.* spans · cost · latency</text>
  <text x="56" y="210" font-size="10.5" fill="#475569">user.task / session.intent (root)</text>
  <text x="56" y="228" font-size="10.5" fill="#475569">retrieval inputs on the span</text>

  <!-- column 2 -->
  <rect x="358" y="78" width="244" height="72" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="374" y="100" font-size="12.5" fill="#047857" font-weight="600">Eval — LLM-as-judge</text>
  <text x="374" y="118" font-size="10.5" fill="#047857">faithfulness · relevance · safety</text>
  <text x="374" y="136" font-size="10.5" fill="#047857">async / sampled</text>

  <rect x="358" y="162" width="244" height="58" rx="8" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="374" y="184" font-size="12.5" fill="#b45309" font-weight="600">User feedback</text>
  <text x="374" y="202" font-size="10.5" fill="#b45309">thumbs up / down</text>

  <rect x="358" y="232" width="244" height="58" rx="8" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="374" y="254" font-size="12.5" fill="#6d28d9" font-weight="600">Business events</text>
  <text x="374" y="272" font-size="10.5" fill="#6d28d9">resolution · escalation · conversion</text>

  <text x="480" y="312" font-size="10" text-anchor="middle" fill="#64748b">each tagged with the trace_id</text>

  <!-- column 3 -->
  <rect x="676" y="78" width="244" height="64" rx="8" fill="#eef2ff" stroke="#6366f1"/>
  <text x="798" y="102" font-size="12.5" text-anchor="middle" fill="#4338ca" font-weight="600">Correlate by trace_id</text>
  <text x="798" y="122" font-size="10.5" text-anchor="middle" fill="#4338ca">Tempo · Prometheus · eval store</text>

  <rect x="676" y="160" width="244" height="130" rx="8" fill="#fff7ed" stroke="#fb923c"/>
  <text x="692" y="182" font-size="12.5" fill="#c2410c" font-weight="600">Monitor — semantic SLOs</text>
  <text x="692" y="204" font-size="10.5" fill="#c2410c">• faithfulness pass rate</text>
  <text x="692" y="222" font-size="10.5" fill="#c2410c">• escalation rate by intent</text>
  <text x="692" y="240" font-size="10.5" fill="#c2410c">• cost per resolution</text>
  <text x="692" y="266" font-size="10.5" fill="#9a3412" font-weight="600">alert when an SLO is breached</text>

  <!-- arrows -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <!-- app -> trace -->
    <line x1="162" y1="124" x2="162" y2="146" marker-end="url(#sm)"/>
    <!-- trace -> producers -->
    <line x1="284" y1="190" x2="354" y2="114" marker-end="url(#sm)"/>
    <line x1="284" y1="200" x2="354" y2="190" marker-end="url(#sm)"/>
    <line x1="284" y1="212" x2="354" y2="260" marker-end="url(#sm)"/>
    <!-- producers -> correlate -->
    <line x1="602" y1="114" x2="672" y2="106" marker-end="url(#sm)"/>
    <line x1="602" y1="190" x2="672" y2="112" marker-end="url(#sm)"/>
    <line x1="602" y1="260" x2="672" y2="118" marker-end="url(#sm)"/>
    <!-- correlate -> monitor -->
    <line x1="798" y1="142" x2="798" y2="156" marker-end="url(#sm)"/>
  </g>

  <text x="480" y="384" font-size="11" text-anchor="middle" fill="#64748b">The trace ID is the join key: it stitches the model call to the eval, the feedback and the business outcome it produced.</text>
</svg>
