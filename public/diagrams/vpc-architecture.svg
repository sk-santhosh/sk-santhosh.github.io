<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 410" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0891b2"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="938" height="408" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#0f172a">Compliance-ready VPC layout</text>

  <!-- internet -->
  <g font-size="14" text-anchor="middle">
    <rect x="24" y="158" width="118" height="56" rx="9" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="83" y="191" fill="#334155">Internet</text>
  </g>

  <!-- VPC boundary -->
  <rect x="186" y="58" width="730" height="320" rx="10" fill="#f8fafc" stroke="#3b82f6" stroke-dasharray="5 4"/>
  <text x="204" y="82" font-size="13" font-weight="600" fill="#1d4ed8">VPC — 10.0.0.0/16</text>

  <g text-anchor="middle">
    <!-- public subnet -->
    <rect x="214" y="100" width="300" height="58" rx="9" fill="#fffbeb" stroke="#f59e0b"/>
    <text x="364" y="123" font-size="13.5" fill="#b45309" font-weight="600">Public subnet</text>
    <text x="364" y="141" font-size="12" fill="#b45309">NAT Gateway · ALB</text>
    <text x="364" y="156" font-size="10.5" fill="#a16207">subnet-0a1b · subnet-0c2d</text>

    <!-- app subnet -->
    <rect x="214" y="186" width="300" height="58" rx="9" fill="#ecfdf5" stroke="#10b981"/>
    <text x="364" y="209" font-size="13.5" fill="#047857" font-weight="600">Private subnet — app tier</text>
    <text x="364" y="227" font-size="12" fill="#047857">no public IP · app SG</text>
    <text x="364" y="242" font-size="10.5" fill="#059669">subnet-0e3f · subnet-0g4h</text>

    <!-- data subnet -->
    <rect x="214" y="272" width="300" height="58" rx="9" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="364" y="295" font-size="13.5" fill="#1d4ed8" font-weight="600">Private subnet — data tier</text>
    <text x="364" y="313" font-size="12" fill="#1d4ed8">no public IP · db SG</text>
    <text x="364" y="328" font-size="10.5" fill="#2563eb">subnet-0i5j · subnet-0k6l</text>

    <!-- vpc endpoints -->
    <rect x="560" y="100" width="356" height="110" rx="9" fill="#f5f3ff" stroke="#8b5cf6"/>
    <text x="738" y="126" font-size="13.5" fill="#6d28d9" font-weight="600">VPC endpoints (PrivateLink)</text>
    <text x="738" y="150" font-size="12.5" fill="#6d28d9">S3 · ECR · Secrets Manager · KMS</text>
    <text x="738" y="174" font-size="11.5" fill="#7c3aed">AWS traffic stays off the internet</text>
    <text x="738" y="194" font-size="11.5" fill="#7c3aed">(encrypted in transit)</text>

    <!-- flow logs -->
    <rect x="560" y="248" width="356" height="82" rx="9" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="738" y="274" font-size="13.5" fill="#0e7490" font-weight="600">VPC Flow Logs (traffic_type: ALL)</text>
    <text x="738" y="296" font-size="12" fill="#0e7490">&#8594; CloudWatch Logs / S3 · 365-day retention</text>
    <text x="738" y="316" font-size="11" fill="#0891b2">captures accept + reject on every ENI</text>
  </g>

  <!-- traffic arrows -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <!-- public -> internet (NAT egress, points out) -->
    <line x1="210" y1="148" x2="142" y2="190" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
    <!-- app to vpc endpoints -->
    <line x1="514" y1="205" x2="556" y2="170" marker-end="url(#arrow)"/>
  </g>

  <!-- ingress arrows (green = subnet/SG-scoped ingress) -->
  <g stroke="#059669" stroke-width="2.2" fill="none">
    <!-- internet -> public ALB ingress (points in) -->
    <line x1="142" y1="168" x2="210" y2="126" marker-end="url(#arrowGreen)"/>
    <!-- public -> app tier ingress -->
    <line x1="364" y1="158" x2="364" y2="184" marker-end="url(#arrowGreen)"/>
    <!-- app -> data tier ingress -->
    <line x1="364" y1="244" x2="364" y2="270" marker-end="url(#arrowGreen)"/>
  </g>

  <!-- flow log capture (dashed cyan) -->
  <g stroke="#06b6d4" stroke-width="1.8" fill="none" stroke-dasharray="5 4">
    <line x1="514" y1="222" x2="556" y2="268" marker-end="url(#arrowCyan)"/>
    <line x1="514" y1="300" x2="556" y2="300" marker-end="url(#arrowCyan)"/>
  </g>

  <!-- labels -->
  <text x="118" y="150" font-size="10.5" text-anchor="middle" fill="#047857">ingress :443 (ALB)</text>
  <text x="150" y="210" font-size="10" text-anchor="middle" fill="#64748b">egress (NAT)</text>
  <text x="374" y="176" font-size="10.5" text-anchor="start" fill="#047857">ingress &#8594; app SG</text>
  <text x="374" y="262" font-size="10.5" text-anchor="start" fill="#047857">:5432 source = app SG (not CIDR)</text>

  <text x="24" y="398" font-size="11.5" fill="#64748b">Security groups reference SGs (not CIDRs) · NACLs deny 0.0.0.0/0 per subnet · all ENI traffic logged for audit</text>
</svg>
