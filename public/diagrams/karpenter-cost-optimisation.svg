<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="ka" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="958" height="428" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#0f172a">How Karpenter provisions and consolidates cluster nodes</text>

  <!-- pending pods -->
  <g text-anchor="middle">
    <rect x="24" y="96" width="150" height="86" rx="9" fill="#fffbeb" stroke="#f59e0b"/>
    <text x="99" y="132" font-size="13.5" fill="#b45309" font-weight="600">Pending pods</text>
    <text x="99" y="152" font-size="11" fill="#b45309">unschedulable</text>

    <!-- karpenter -->
    <rect x="214" y="84" width="196" height="110" rx="10" fill="#f5f3ff" stroke="#8b5cf6"/>
    <text x="312" y="116" font-size="14" fill="#6d28d9" font-weight="600">Karpenter controller</text>
    <text x="312" y="138" font-size="11" fill="#6d28d9">batches pending pods</text>
    <text x="312" y="156" font-size="11" fill="#6d28d9">picks cheapest fitting</text>
    <text x="312" y="172" font-size="11" fill="#6d28d9">instance type</text>

    <!-- ec2 fleet -->
    <rect x="450" y="96" width="170" height="86" rx="9" fill="#fff7ed" stroke="#fb923c"/>
    <text x="535" y="128" font-size="13.5" fill="#c2410c" font-weight="600">Amazon EC2 Fleet</text>
    <text x="535" y="148" font-size="11" fill="#c2410c">spot first ·</text>
    <text x="535" y="164" font-size="11" fill="#c2410c">on-demand fallback</text>
  </g>

  <!-- right-sized node -->
  <rect x="660" y="74" width="276" height="148" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="798" y="100" font-size="14" text-anchor="middle" fill="#1d4ed8" font-weight="600">Right-sized node</text>
  <text x="798" y="118" font-size="11" text-anchor="middle" fill="#1d4ed8">bin-packed · mostly spot</text>
  <g fill="#dbeafe" stroke="#60a5fa">
    <rect x="676" y="132" width="46" height="24" rx="5"/>
    <rect x="730" y="132" width="46" height="24" rx="5"/>
    <rect x="784" y="132" width="46" height="24" rx="5"/>
    <rect x="838" y="132" width="46" height="24" rx="5"/>
    <rect x="676" y="164" width="46" height="24" rx="5"/>
    <rect x="730" y="164" width="46" height="24" rx="5"/>
    <rect x="784" y="164" width="46" height="24" rx="5"/>
  </g>
  <g fill="#1d4ed8" font-size="10" text-anchor="middle">
    <text x="699" y="148">pod</text>
    <text x="753" y="148">pod</text>
    <text x="807" y="148">pod</text>
    <text x="861" y="148">pod</text>
    <text x="699" y="180">pod</text>
    <text x="753" y="180">pod</text>
    <text x="807" y="180">pod</text>
  </g>

  <!-- arrows -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <line x1="174" y1="139" x2="210" y2="139" marker-end="url(#ka)"/>
    <line x1="410" y1="139" x2="446" y2="139" marker-end="url(#ka)"/>
    <line x1="620" y1="139" x2="656" y2="146" marker-end="url(#ka)"/>
  </g>
  <text x="535" y="88" font-size="10.5" text-anchor="middle" fill="#64748b">launches</text>

  <!-- consolidation loop -->
  <g stroke="#10b981" stroke-width="2" fill="none" stroke-dasharray="5 4">
    <path d="M798 222 L798 300 L312 300 L312 196" marker-end="url(#ka)"/>
  </g>
  <rect x="360" y="284" width="392" height="32" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="556" y="304" font-size="11.5" text-anchor="middle" fill="#047857" font-weight="600">Consolidation — repack workloads, remove underutilised nodes</text>

  <text x="480" y="362" font-size="11" text-anchor="middle" fill="#64748b">Karpenter continuously re-evaluates the cluster: it scales up to fit pending pods and scales down by consolidating onto fewer, cheaper nodes.</text>
</svg>
