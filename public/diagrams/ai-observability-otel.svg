<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="oa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="958" height="358" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#0f172a">Tracing an AI application end to end with OpenTelemetry</text>

  <!-- AI app -->
  <rect x="24" y="116" width="214" height="128" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="131" y="142" font-size="13.5" text-anchor="middle" fill="#1d4ed8" font-weight="600">AI application</text>
  <text x="131" y="164" font-size="11" text-anchor="middle" fill="#1d4ed8">LLM SDK + OTel SDK</text>
  <text x="131" y="186" font-size="10.5" text-anchor="middle" fill="#1d4ed8">emits gen_ai.* spans,</text>
  <text x="131" y="202" font-size="10.5" text-anchor="middle" fill="#1d4ed8">token &amp; latency metrics,</text>
  <text x="131" y="218" font-size="10.5" text-anchor="middle" fill="#1d4ed8">prompt/response logs</text>

  <!-- collector -->
  <rect x="290" y="150" width="160" height="62" rx="10" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="370" y="176" font-size="12.5" text-anchor="middle" fill="#6d28d9" font-weight="600">OpenTelemetry</text>
  <text x="370" y="194" font-size="11" text-anchor="middle" fill="#6d28d9">Collector (OTLP)</text>

  <!-- backends -->
  <g text-anchor="middle">
    <rect x="506" y="96" width="190" height="50" rx="9" fill="#ecfdf5" stroke="#10b981"/>
    <text x="601" y="117" font-size="12.5" fill="#047857" font-weight="600">Tempo</text>
    <text x="601" y="134" font-size="10.5" fill="#047857">traces</text>

    <rect x="506" y="156" width="190" height="50" rx="9" fill="#fffbeb" stroke="#f59e0b"/>
    <text x="601" y="177" font-size="12.5" fill="#b45309" font-weight="600">Prometheus</text>
    <text x="601" y="194" font-size="10.5" fill="#b45309">metrics</text>

    <rect x="506" y="216" width="190" height="50" rx="9" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="601" y="237" font-size="12.5" fill="#0e7490" font-weight="600">Loki</text>
    <text x="601" y="254" font-size="10.5" fill="#0e7490">logs</text>
  </g>

  <!-- grafana -->
  <rect x="752" y="150" width="184" height="62" rx="10" fill="#fff7ed" stroke="#fb923c"/>
  <text x="844" y="176" font-size="13" text-anchor="middle" fill="#c2410c" font-weight="600">Grafana</text>
  <text x="844" y="194" font-size="10.5" text-anchor="middle" fill="#c2410c">dashboards · Explore</text>

  <!-- arrows -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <line x1="238" y1="181" x2="286" y2="181" marker-end="url(#oa)"/>
    <line x1="450" y1="172" x2="502" y2="121" marker-end="url(#oa)"/>
    <line x1="450" y1="181" x2="502" y2="181" marker-end="url(#oa)"/>
    <line x1="450" y1="190" x2="502" y2="241" marker-end="url(#oa)"/>
    <line x1="696" y1="121" x2="748" y2="172" marker-end="url(#oa)"/>
    <line x1="696" y1="181" x2="748" y2="181" marker-end="url(#oa)"/>
    <line x1="696" y1="241" x2="748" y2="190" marker-end="url(#oa)"/>
  </g>
  <text x="262" y="172" font-size="10" text-anchor="middle" fill="#64748b">OTLP</text>
  <text x="480" y="300" font-size="11" text-anchor="middle" fill="#64748b">One trace links the retrieval, the model call and the token cost — correlated across all three signals in Grafana.</text>
</svg>
