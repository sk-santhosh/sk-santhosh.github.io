<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 330" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="918" height="328" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#0f172a">HTTP/1.1 vs HTTP/2 — connections and streams</text>
  <line x1="460" y1="58" x2="460" y2="306" stroke="#e2e8f0" stroke-dasharray="4 4"/>

  <!-- HTTP/1.1 -->
  <text x="40" y="78" font-size="14" font-weight="600" fill="#b45309">HTTP/1.1</text>
  <g text-anchor="middle" font-size="12.5">
    <rect x="36" y="100" width="74" height="160" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="73" y="184" fill="#334155">Client</text>
    <rect x="330" y="100" width="80" height="160" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="370" y="184" fill="#334155">Server</text>
  </g>
  <!-- separate connections, one request each; one blocked -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <line x1="112" y1="124" x2="328" y2="124" marker-end="url(#a)"/>
    <line x1="112" y1="158" x2="328" y2="158" marker-end="url(#a)"/>
    <line x1="112" y1="236" x2="328" y2="236" marker-end="url(#a)"/>
  </g>
  <g font-size="11" text-anchor="middle">
    <rect x="150" y="114" width="60" height="20" rx="4" fill="#dbeafe" stroke="#3b82f6"/><text x="180" y="128" fill="#1d4ed8">req 1</text>
    <rect x="150" y="148" width="60" height="20" rx="4" fill="#dcfce7" stroke="#22c55e"/><text x="180" y="162" fill="#15803d">req 2</text>
    <rect x="150" y="194" width="120" height="20" rx="4" fill="#fee2e2" stroke="#ef4444"/><text x="210" y="208" fill="#b91c1c">req 3 — blocked</text>
    <rect x="150" y="226" width="60" height="20" rx="4" fill="#ede9fe" stroke="#8b5cf6"/><text x="180" y="240" fill="#6d28d9">req 4</text>
  </g>
  <text x="225" y="288" font-size="11.5" text-anchor="middle" fill="#64748b">many connections · head-of-line blocking</text>

  <!-- HTTP/2 -->
  <text x="484" y="78" font-size="14" font-weight="600" fill="#0e7490">HTTP/2</text>
  <g text-anchor="middle" font-size="12.5">
    <rect x="480" y="120" width="74" height="120" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="517" y="184" fill="#334155">Client</text>
    <rect x="806" y="120" width="80" height="120" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="846" y="184" fill="#334155">Server</text>
  </g>
  <!-- single connection carrying interleaved streams -->
  <rect x="556" y="166" width="248" height="28" rx="6" fill="#ecfeff" stroke="#06b6d4"/>
  <g font-size="10.5" text-anchor="middle">
    <rect x="564" y="172" width="42" height="16" rx="3" fill="#dbeafe"/><text x="585" y="184" fill="#1d4ed8">s1</text>
    <rect x="610" y="172" width="42" height="16" rx="3" fill="#dcfce7"/><text x="631" y="184" fill="#15803d">s2</text>
    <rect x="656" y="172" width="42" height="16" rx="3" fill="#ede9fe"/><text x="677" y="184" fill="#6d28d9">s3</text>
    <rect x="702" y="172" width="42" height="16" rx="3" fill="#fef9c3"/><text x="723" y="184" fill="#a16207">s4</text>
    <rect x="748" y="172" width="48" height="16" rx="3" fill="#dbeafe"/><text x="772" y="184" fill="#1d4ed8">s1</text>
  </g>
  <line x1="804" y1="180" x2="804" y2="180"/>
  <text x="680" y="232" font-size="11.5" text-anchor="middle" fill="#0891b2">one connection · interleaved streams · HPACK headers</text>
  <text x="680" y="288" font-size="11.5" text-anchor="middle" fill="#64748b">no application-layer head-of-line blocking</text>
</svg>
