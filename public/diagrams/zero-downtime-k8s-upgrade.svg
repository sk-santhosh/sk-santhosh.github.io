<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="ua" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="958" height="428" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#0f172a">A zero-downtime upgrade, in order</text>

  <!-- top sequence -->
  <g text-anchor="middle">
    <rect x="26" y="64" width="170" height="62" rx="9" fill="#fffbeb" stroke="#f59e0b"/>
    <text x="111" y="90" font-size="12.5" fill="#b45309" font-weight="600">1 · Pre-flight</text>
    <text x="111" y="108" font-size="10.5" fill="#b45309">scan deprecated APIs</text>

    <rect x="211" y="64" width="170" height="62" rx="9" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="296" y="90" font-size="12.5" fill="#1d4ed8" font-weight="600">2 · Control plane</text>
    <text x="296" y="108" font-size="10.5" fill="#1d4ed8">one minor at a time</text>

    <rect x="396" y="64" width="170" height="62" rx="9" fill="#f5f3ff" stroke="#8b5cf6"/>
    <text x="481" y="90" font-size="12.5" fill="#6d28d9" font-weight="600">3 · Add-ons</text>
    <text x="481" y="108" font-size="10.5" fill="#6d28d9">CNI · CoreDNS · proxy</text>

    <rect x="581" y="64" width="170" height="62" rx="9" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="666" y="90" font-size="12.5" fill="#0e7490" font-weight="600">4 · Node rollout</text>
    <text x="666" y="108" font-size="10.5" fill="#0e7490">surge &amp; drain</text>

    <rect x="766" y="64" width="170" height="62" rx="9" fill="#ecfdf5" stroke="#10b981"/>
    <text x="851" y="90" font-size="12.5" fill="#047857" font-weight="600">5 · Verify</text>
    <text x="851" y="108" font-size="10.5" fill="#047857">SLOs &amp; smoke tests</text>
  </g>

  <!-- sequence arrows -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <line x1="196" y1="95" x2="207" y2="95" marker-end="url(#ua)"/>
    <line x1="381" y1="95" x2="392" y2="95" marker-end="url(#ua)"/>
    <line x1="566" y1="95" x2="577" y2="95" marker-end="url(#ua)"/>
    <line x1="751" y1="95" x2="762" y2="95" marker-end="url(#ua)"/>
    <!-- connector down to detail -->
    <line x1="666" y1="126" x2="666" y2="196" stroke-dasharray="5 4" marker-end="url(#ua)"/>
  </g>

  <!-- node rollout detail panel -->
  <rect x="80" y="200" width="800" height="170" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="480" y="228" font-size="13" text-anchor="middle" fill="#0e7490" font-weight="600">Node rollout — one node at a time, capacity stays flat</text>

  <g text-anchor="middle" font-size="11">
    <rect x="100" y="252" width="128" height="46" rx="7" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="164" y="273" fill="#0e7490" font-weight="600">Surge</text>
    <text x="164" y="289" fill="#0e7490">add new-version node</text>

    <rect x="253" y="252" width="128" height="46" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="317" y="273" fill="#334155" font-weight="600">Cordon</text>
    <text x="317" y="289" fill="#475569">old node</text>

    <rect x="406" y="252" width="128" height="46" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="470" y="273" fill="#334155" font-weight="600">Drain</text>
    <text x="470" y="289" fill="#475569">evict · honour PDB</text>

    <rect x="559" y="252" width="128" height="46" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="623" y="273" fill="#334155" font-weight="600">Reschedule</text>
    <text x="623" y="289" fill="#475569">pods to new node</text>

    <rect x="712" y="252" width="128" height="46" rx="7" fill="#fef2f2" stroke="#f87171"/>
    <text x="776" y="273" fill="#b91c1c" font-weight="600">Remove</text>
    <text x="776" y="289" fill="#b91c1c">old node</text>
  </g>

  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <line x1="228" y1="275" x2="249" y2="275" marker-end="url(#ua)"/>
    <line x1="381" y1="275" x2="402" y2="275" marker-end="url(#ua)"/>
    <line x1="534" y1="275" x2="555" y2="275" marker-end="url(#ua)"/>
    <line x1="687" y1="275" x2="708" y2="275" marker-end="url(#ua)"/>
    <!-- repeat loop -->
    <path d="M776 298 L776 336 L164 336 L164 300" stroke="#06b6d4" stroke-dasharray="5 4" marker-end="url(#ua)"/>
  </g>
  <rect x="396" y="322" width="168" height="28" rx="8" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="480" y="341" font-size="11" text-anchor="middle" fill="#0e7490" font-weight="600">repeat per node</text>
</svg>
