<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="ea" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="958" height="428" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#0f172a">Where the eval runs: three timelines, one trace_id</text>

  <!-- synchronous band -->
  <rect x="24" y="46" width="912" height="84" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="40" y="66" font-size="12" fill="#475569" font-weight="600">1 · Request path — synchronous (the user is waiting)</text>
  <g text-anchor="middle">
    <rect x="44" y="78" width="120" height="40" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="104" y="102" font-size="11.5" fill="#334155">User request</text>
    <rect x="200" y="78" width="150" height="40" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="275" y="102" font-size="11.5" fill="#1d4ed8">App · model call</text>
    <rect x="386" y="78" width="250" height="40" rx="8" fill="#eef2ff" stroke="#6366f1"/>
    <text x="511" y="102" font-size="11.5" fill="#4338ca">Response + trace · trace_id</text>
  </g>
  <text x="664" y="94" font-size="9.5" fill="#64748b">inline guardrails only</text>
  <text x="664" y="108" font-size="9.5" fill="#64748b">(safety · PII)</text>
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <line x1="164" y1="98" x2="196" y2="98" marker-end="url(#ea)"/>
    <line x1="350" y1="98" x2="382" y2="98" marker-end="url(#ea)"/>
  </g>

  <!-- trace_id flows down -->
  <line x1="511" y1="130" x2="511" y2="158" stroke="#6366f1" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ea)"/>
  <text x="525" y="150" font-size="9.5" fill="#4338ca">trace_id handed downstream</text>

  <!-- async label -->
  <text x="40" y="178" font-size="12" fill="#475569" font-weight="600">2 · Produced later, out of band — each written back by trace_id</text>

  <!-- async sources -->
  <rect x="44" y="190" width="340" height="56" rx="9" fill="#ecfdf5" stroke="#10b981"/>
  <text x="60" y="212" font-size="12" fill="#047857" font-weight="600">Eval worker — queue → LLM-as-judge</text>
  <text x="60" y="230" font-size="10" fill="#047857">sampled · async · seconds–minutes later</text>

  <rect x="44" y="256" width="340" height="56" rx="9" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="60" y="278" font-size="12" fill="#b45309" font-weight="600">User feedback — thumbs up / down</text>
  <text x="60" y="296" font-size="10" fill="#b45309">ad hoc · human · seconds–days later</text>

  <rect x="44" y="322" width="340" height="56" rx="9" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="60" y="344" font-size="12" fill="#6d28d9" font-weight="600">Business events</text>
  <text x="60" y="362" font-size="10" fill="#6d28d9">resolution · escalation · ad hoc</text>

  <!-- join box -->
  <rect x="560" y="210" width="376" height="148" rx="10" fill="#fff7ed" stroke="#fb923c"/>
  <text x="748" y="240" font-size="13" text-anchor="middle" fill="#c2410c" font-weight="600">Correlate by trace_id</text>
  <text x="748" y="266" font-size="10.5" text-anchor="middle" fill="#c2410c">observability backend</text>
  <text x="748" y="284" font-size="10.5" text-anchor="middle" fill="#c2410c">Tempo · Prometheus · eval store</text>
  <line x1="600" y1="300" x2="896" y2="300" stroke="#fed7aa"/>
  <text x="748" y="326" font-size="11" text-anchor="middle" fill="#9a3412" font-weight="600">→ dashboards &amp; semantic SLOs</text>

  <!-- arrows to join -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <line x1="384" y1="214" x2="556" y2="258" marker-end="url(#ea)"/>
    <line x1="384" y1="284" x2="556" y2="284" marker-end="url(#ea)"/>
    <line x1="384" y1="352" x2="556" y2="312" marker-end="url(#ea)"/>
  </g>

  <text x="480" y="410" font-size="11" text-anchor="middle" fill="#64748b">The request returns immediately; evals, feedback and outcomes arrive later and are joined back to the original call by trace_id.</text>
</svg>
