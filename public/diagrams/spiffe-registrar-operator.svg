<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 410" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="ro" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="958" height="408" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#0f172a">The spiffe-registrar reconcile loop</text>

  <!-- K8s API -->
  <rect x="24" y="86" width="252" height="206" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="150" y="110" font-size="13" text-anchor="middle" fill="#1d4ed8" font-weight="600">Kubernetes API (desired state)</text>
  <rect x="44" y="126" width="212" height="56" rx="7" fill="#ffffff" stroke="#93c5fd"/>
  <text x="150" y="148" font-size="11.5" text-anchor="middle" fill="#1d4ed8" font-weight="600">Deployment: checkout</text>
  <text x="150" y="166" font-size="10" text-anchor="middle" fill="#1d4ed8">labels · serviceAccountName</text>
  <rect x="44" y="194" width="212" height="68" rx="7" fill="#ffffff" stroke="#93c5fd"/>
  <text x="150" y="216" font-size="11.5" text-anchor="middle" fill="#1d4ed8" font-weight="600">SpiffeRegistration (CR)</text>
  <text x="150" y="234" font-size="10" text-anchor="middle" fill="#1d4ed8">selector · trustDomain</text>
  <text x="150" y="250" font-size="10" text-anchor="middle" fill="#1d4ed8">parentID · ttl</text>

  <!-- Operator -->
  <rect x="356" y="74" width="250" height="230" rx="10" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="481" y="98" font-size="13" text-anchor="middle" fill="#6d28d9" font-weight="600">spiffe-registrar operator</text>
  <text x="372" y="128" font-size="11" fill="#6d28d9">1 · watch Deployments + CR</text>
  <text x="372" y="156" font-size="11" fill="#6d28d9">2 · Reconcile():</text>
  <text x="384" y="174" font-size="10.5" fill="#6d28d9">observe → diff → act</text>
  <text x="372" y="202" font-size="11" fill="#6d28d9">3 · finalizer: add on create,</text>
  <text x="384" y="218" font-size="10.5" fill="#6d28d9">remove before delete</text>
  <rect x="372" y="236" width="218" height="50" rx="7" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="481" y="256" font-size="10.5" text-anchor="middle" fill="#6d28d9">leader-elected · rate-limited</text>
  <text x="481" y="272" font-size="10.5" text-anchor="middle" fill="#6d28d9">Prometheus metrics</text>

  <!-- SPIRE -->
  <rect x="686" y="86" width="250" height="206" rx="10" fill="#ecfdf5" stroke="#10b981"/>
  <text x="811" y="110" font-size="13" text-anchor="middle" fill="#047857" font-weight="600">SPIRE Server (actual state)</text>
  <text x="811" y="130" font-size="10.5" text-anchor="middle" fill="#047857">Entry API · gRPC over mTLS</text>
  <rect x="706" y="142" width="210" height="30" rx="6" fill="#ffffff" stroke="#6ee7b7"/>
  <text x="811" y="161" font-size="11" text-anchor="middle" fill="#047857">BatchCreateEntry()</text>
  <rect x="706" y="180" width="210" height="30" rx="6" fill="#ffffff" stroke="#6ee7b7"/>
  <text x="811" y="199" font-size="11" text-anchor="middle" fill="#047857">BatchDeleteEntry()</text>
  <text x="811" y="240" font-size="11" text-anchor="middle" fill="#047857" font-weight="600">registration registry</text>
  <text x="811" y="258" font-size="10" text-anchor="middle" fill="#047857">→ SVID issued to the workload</text>

  <!-- arrows -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <line x1="276" y1="150" x2="352" y2="150" marker-end="url(#ro)"/>
    <line x1="606" y1="150" x2="682" y2="150" marker-end="url(#ro)"/>
    <path d="M356 250 C 320 252, 300 252, 280 250" marker-end="url(#ro)"/>
  </g>
  <text x="314" y="140" font-size="10" text-anchor="middle" fill="#64748b">watch</text>
  <text x="644" y="140" font-size="10" text-anchor="middle" fill="#64748b">register / delete</text>
  <text x="316" y="276" font-size="9.5" text-anchor="middle" fill="#64748b">finalizer · status</text>

  <text x="480" y="384" font-size="11" text-anchor="middle" fill="#64748b">Every Deployment matching the policy gets a SPIFFE entry automatically — and the finalizer guarantees the entry is removed when the Deployment is.</text>
</svg>
