<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="sa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="958" height="378" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#0f172a">What happens when a spot node is reclaimed: the two-minute window</text>

  <!-- two-minute window band -->
  <rect x="330" y="84" width="500" height="232" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-dasharray="5 4"/>
  <text x="580" y="106" font-size="12" text-anchor="middle" fill="#b45309" font-weight="600">two-minute drain window — design for this</text>

  <!-- lane labels -->
  <text x="36" y="150" font-size="11.5" fill="#1d4ed8" font-weight="600">AWS + Karpenter</text>
  <text x="36" y="266" font-size="11.5" fill="#047857" font-weight="600">Your workload</text>

  <!-- AWS / Karpenter lane -->
  <rect x="346" y="118" width="468" height="60" rx="9" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="580" y="143" font-size="13" text-anchor="middle" fill="#1d4ed8" font-weight="600">Karpenter</text>
  <text x="580" y="162" font-size="11" text-anchor="middle" fill="#1d4ed8">cordon &amp; drain node · launch replacement · reschedule pods</text>

  <!-- your workload lane -->
  <rect x="346" y="222" width="468" height="60" rx="9" fill="#ecfdf5" stroke="#10b981"/>
  <text x="580" y="247" font-size="13" text-anchor="middle" fill="#047857" font-weight="600">Your app receives SIGTERM</text>
  <text x="580" y="266" font-size="11" text-anchor="middle" fill="#047857">stop new work · finish or checkpoint in-flight · exit cleanly</text>

  <!-- timeline axis -->
  <line x1="70" y1="200" x2="895" y2="200" stroke="#94a3b8" stroke-width="2" marker-end="url(#sa)"/>
  <text x="890" y="190" font-size="11" text-anchor="end" fill="#64748b">time</text>

  <!-- rebalance recommendation -->
  <circle cx="190" cy="200" r="6" fill="#ffffff" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3 2"/>
  <text x="190" y="338" font-size="11" text-anchor="middle" fill="#64748b">Rebalance recommendation</text>
  <text x="190" y="353" font-size="10" text-anchor="middle" fill="#94a3b8">earlier · best-effort</text>

  <!-- interruption notice -->
  <circle cx="330" cy="200" r="7" fill="#f59e0b"/>
  <text x="330" y="338" font-size="11.5" text-anchor="middle" fill="#b45309" font-weight="600">Interruption notice</text>
  <text x="330" y="353" font-size="10.5" text-anchor="middle" fill="#b45309">T−2:00</text>

  <!-- reclaimed -->
  <circle cx="830" cy="200" r="7" fill="#ef4444"/>
  <text x="830" y="338" font-size="11.5" text-anchor="middle" fill="#b91c1c" font-weight="600">Node reclaimed</text>
  <text x="830" y="353" font-size="10.5" text-anchor="middle" fill="#b91c1c">T−0:00</text>
</svg>
