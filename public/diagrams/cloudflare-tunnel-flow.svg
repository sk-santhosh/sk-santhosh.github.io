<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 250" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="918" height="248" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#0f172a">Cloudflare Tunnel — inbound traffic, no public ports</text>

  <!-- cluster boundary -->
  <rect x="398" y="64" width="498" height="118" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="5 4"/>
  <text x="412" y="84" font-size="12" font-weight="600" fill="#475569">Kubernetes cluster (private)</text>

  <!-- nodes -->
  <g font-size="14" text-anchor="middle">
    <rect x="24" y="108" width="120" height="52" rx="9" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="84" y="139" fill="#334155">User</text>

    <rect x="192" y="108" width="156" height="52" rx="9" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="270" y="139" fill="#0e7490">Cloudflare Edge</text>

    <rect x="412" y="108" width="140" height="52" rx="9" fill="#f5f3ff" stroke="#8b5cf6"/>
    <text x="482" y="139" fill="#6d28d9">cloudflared</text>

    <rect x="576" y="108" width="140" height="52" rx="9" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="646" y="135" fill="#1d4ed8">ClusterIP</text>
    <text x="646" y="151" fill="#1d4ed8">Service</text>

    <rect x="740" y="108" width="140" height="52" rx="9" fill="#ecfdf5" stroke="#10b981"/>
    <text x="810" y="139" fill="#047857">App Pods</text>
  </g>

  <!-- arrows -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <line x1="146" y1="134" x2="186" y2="134" marker-end="url(#arrow)"/>
    <line x1="350" y1="134" x2="408" y2="134" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
    <line x1="554" y1="134" x2="572" y2="134" marker-end="url(#arrow)"/>
    <line x1="718" y1="134" x2="736" y2="134" marker-end="url(#arrow)"/>
  </g>
  <text x="379" y="98" font-size="11" text-anchor="middle" fill="#0e7490">outbound tunnel</text>
  <text x="24" y="218" font-size="12.5" fill="#64748b">The cluster dials out to Cloudflare — nothing listens on a public IP or inbound port.</text>
</svg>
